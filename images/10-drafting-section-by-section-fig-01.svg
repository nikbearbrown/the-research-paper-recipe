  <!-- RIGHT column: drafting order -->
  <!-- Methods (ready) -->
  <rect x="480" y="108" width="140" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="550" y="135" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Methods</text>
  <rect x="480" y="172" width="140" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
