<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Drafting Order vs. Reading Order</title>
  <desc>Two parallel vertical sequences of paper sections. Papers are read Introduction-first but should be drafted Methods-first, because each drafting step depends on the prior step's content already existing. Connectors link the four shared sections that change position.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="10-drafting-section-by-section" figure-number="01" date-generated="2026-05-29"/></metadata>
