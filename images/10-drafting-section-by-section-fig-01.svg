  <text x="150" y="327" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Discussion</text>
  <rect x="80" y="364" width="140" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="150" y="391" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Abstract</text>
