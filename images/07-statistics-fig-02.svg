<!-- Statistical significance versus effect size | Book: The Research Paper Recipe | Chapter: 07-statistics | Figure: 02 | Generated: 2026-05-29 | Source: pantry/07-statistics-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">Statistical significance versus effect size</title><desc id="fig-desc-02">A two-by-two space with effect size on the horizontal axis and significance on the vertical axis; four dot-and-error-bar markers show that a tiny effect can be significant and a large effect non-significant.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="07-statistics" figure-number="02" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<defs><marker id="arr02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2a1a0e"/></marker></defs>
<text x="350" y="34" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Significance and effect size are independent</text>
<!-- plot region -->
<rect x="120" y="70" width="460" height="290" fill="#F5F5F5" stroke="none"/>
<!-- axes -->
<line x1="120" y1="360" x2="600" y2="360" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arr02)"/>
<line x1="120" y1="360" x2="120" y2="58" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arr02)"/>
<text x="350" y="392" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Effect size (magnitude) →</text>
<text x="78" y="215" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" transform="rotate(-90 78 215)">Significance →</text>
<!-- quadrant divider hairlines -->
<line x1="350" y1="70" x2="350" y2="360" stroke="#D4D4D4" stroke-width="1"/>
<line x1="120" y1="215" x2="580" y2="215" stroke="#D4D4D4" stroke-width="1"/>
<!-- vertical zero-effect reference line (dashed) -->
<line x1="160" y1="70" x2="160" y2="360" stroke="#545454" stroke-width="1" stroke-dasharray="4 3"/>
<text x="160" y="84" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">0</text>
<!-- small effect / significant : small red dot, short bar, not crossing zero -->
<line x1="230" y1="140" x2="250" y2="140" stroke="#C8102E" stroke-width="1.4"/>
<circle cx="240" cy="140" r="5" fill="#C8102E"/>
<!-- large effect / significant : large red dot, short bar -->
<line x1="470" y1="140" x2="498" y2="140" stroke="#C8102E" stroke-width="1.4"/>
<circle cx="484" cy="140" r="8" fill="#C8102E"/>
<!-- small effect / non-significant : small open gray dot, wide bar crossing zero -->
<line x1="135" y1="290" x2="248" y2="290" stroke="#545454" stroke-width="1.4"/>
<circle cx="200" cy="290" r="5" fill="#FFFFFF" stroke="#545454" stroke-width="1.4"/>
<!-- large effect / non-significant : large gray dot, wide bar crossing zero -->
<line x1="135" y1="290" x2="500" y2="290" stroke="#545454" stroke-width="1.4"/>
<circle cx="470" cy="290" r="8" fill="#FFFFFF" stroke="#545454" stroke-width="1.4"/>
<!-- quadrant cues -->
<text x="235" y="112" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">small &amp; significant</text>
<text x="465" y="112" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">large &amp; significant</text>
<text x="235" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">small &amp; n.s.</text>
<text x="465" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">large &amp; n.s.</text>
</svg>
