<!-- Reliability vs validity | Book: The Research Paper Recipe | Chapter: 05-measurement | Figure: 02 | Generated: 2026-05-29 | Source: pantry/05-measurement-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02">
  <title id="fig-title-02">Reliability is consistency; validity is hitting the target</title>
  <desc id="fig-desc-02">Two bullseye targets. The left target has a tight cluster of marks far off-centre — reliable but not valid. The right target has a tight cluster on the bullseye — reliable and valid. Consistency does not guarantee accuracy.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="05-measurement" figure-number="02" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="40" y="44" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Two orthogonal properties on one dartboard</text>

  <!-- LEFT target: reliable, not valid -->
  <circle cx="200" cy="220" r="105" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <circle cx="200" cy="220" r="70" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <circle cx="200" cy="220" r="35" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <circle cx="200" cy="220" r="3" fill="#545454"/>
  <!-- off-center tight cluster -->
  <circle cx="262" cy="165" r="5" fill="#545454"/>
  <circle cx="272" cy="172" r="5" fill="#545454"/>
  <circle cx="266" cy="178" r="5" fill="#545454"/>
  <circle cx="276" cy="160" r="5" fill="#545454"/>
  <text x="200" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e" text-anchor="middle">Reliable, not valid</text>
  <text x="200" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">consistent but off-target</text>

  <!-- RIGHT target: reliable and valid -->
  <circle cx="500" cy="220" r="105" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <circle cx="500" cy="220" r="70" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <circle cx="500" cy="220" r="35" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <circle cx="500" cy="220" r="3" fill="#2a1a0e"/>
  <!-- centered tight cluster (emphasis red) -->
  <circle cx="494" cy="214" r="5" fill="#C8102E"/>
  <circle cx="506" cy="216" r="5" fill="#C8102E"/>
  <circle cx="498" cy="226" r="5" fill="#C8102E"/>
  <circle cx="509" cy="228" r="5" fill="#C8102E"/>
  <text x="500" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e" text-anchor="middle">Reliable and valid</text>
  <text x="500" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">consistent and on-target</text>

  <text x="40" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A thermometer reading a steady four degrees high is perfectly reliable — and wrong every time.</text>
</svg>
