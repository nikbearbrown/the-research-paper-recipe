<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">Statistical Integrity Trace</title>
  <desc>Every quantitative claim must trace identically across four locations: software output, the Results table, the in-text statement, and the Abstract. The equals signs mark required matches. A mismatched Abstract value, shown below crossed by a not-equal sign, is a reporting error the trace catches.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="11-quality-control" figure-number="02" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Statistical Integrity Trace</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The same number must survive intact from the software output to the Abstract &#8212; any mismatch is an error</text>

  <!-- four trace boxes -->
  <rect x="40" y="140" width="120" height="64" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="100" y="168" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Software</text>
  <text x="100" y="183" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">output</text>
  <text x="100" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">p = .032</text>

  <rect x="220" y="140" width="120" height="64" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="280" y="168" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Results</text>
  <text x="280" y="183" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">table</text>
  <text x="280" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">p = .032</text>

  <rect x="400" y="140" width="120" height="64" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="460" y="168" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Results text</text>
  <text x="460" y="183" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">(in-text)</text>
  <text x="460" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">p = .032</text>

  <rect x="580" y="140" width="100" height="64" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="630" y="176" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Abstract</text>
  <text x="630" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">p = .032</text>

  <!-- match links with equals glyphs -->
  <line x1="160" y1="172" x2="218" y2="172" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="189" y="160" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" fill="#545454">=</text>
  <line x1="340" y1="172" x2="398" y2="172" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="369" y="160" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" fill="#545454">=</text>
  <line x1="520" y1="172" x2="578" y2="172" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="549" y="160" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" fill="#545454">=</text>

  <!-- mismatch box offset below the last link -->
  <rect x="580" y="280" width="100" height="64" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="630" y="308" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">Abstract</text>
  <text x="630" y="324" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">(mismatch)</text>
  <text x="630" y="340" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#C8102E">p = .02</text>

  <line x1="490" y1="290" x2="578" y2="300" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="528" y="278" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="16" fill="#C8102E">&#8800;</text>

  <text x="32" y="384" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">All four sanctioned locations report one value. The lone divergent Abstract figure is the caught reporting error.</text>
</svg>
