  <rect x="16" y="294" width="148" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="90" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Hold time</text>
  <text x="90" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">constant</text>
  <rect x="189" y="294" width="148" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="263" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Vary pace,</text>
  <text x="263" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">log it</text>
