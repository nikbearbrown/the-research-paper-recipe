  <rect x="250" y="78" width="200" height="48" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="350" y="100" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Observed: retention</text>
  <text x="350" y="116" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">improves</text>

  <!-- Branch lines to four children -->
  <line x1="350" y1="126" x2="90" y2="178" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="350" y1="126" x2="263" y2="178" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="350" y1="126" x2="437" y2="178" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="350" y1="126" x2="610" y2="178" stroke="#2a1a0e" stroke-width="1"/>

  <!-- Child A -->
  <rect x="16" y="180" width="148" height="58" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="90" y="202" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">More practice</text>
  <text x="90" y="218" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">time on task</text>
  <!-- Child B -->
  <rect x="189" y="180" width="148" height="58" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="263" y="202" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Personalized</text>
  <text x="263" y="218" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">pacing</text>
  <!-- Child C -->
  <rect x="363" y="180" width="148" height="58" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="437" y="202" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Immediate</text>
  <text x="437" y="218" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">feedback</text>
