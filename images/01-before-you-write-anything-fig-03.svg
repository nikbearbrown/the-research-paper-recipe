  <text x="437" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Delay vs.</text>
  <text x="437" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">instant feedback</text>
  <rect x="536" y="294" width="148" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="610" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Compare to a</text>
  <text x="610" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">sham tool</text>

  <text x="32" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">competing mechanisms</text>
  <text x="32" y="396" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">distinguishing measurement the design must add</text>
  <text x="32" y="414" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A result is not an explanation: your design earns its keep by ruling rival mechanisms out.</text>
