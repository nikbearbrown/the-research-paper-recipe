<title id="fig-title-03">The Claim-to-Sample Scope Gap</title>
<desc id="fig-desc-03">Two stacked panels. The top panel shows a wide claim bar over a short sample bar, with the unsupported span to the right bracketed as the overgeneralization gap. The bottom panel shows the corrected claim shrunk to match the sample, leaving no gap.</desc>
