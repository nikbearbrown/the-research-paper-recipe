<text x="455" y="212" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Condition B</text>
<!-- BOTTOM ROW: raw points -->
<text x="60" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" font-weight="bold">What the bars hide</text>
<rect x="80" y="256" width="540" height="130" fill="#F5F5F5"/>
<line x1="80" y1="386" x2="620" y2="386" stroke="#2a1a0e" stroke-width="1.2"/>
