<text x="350" y="30" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Equal means, opposite distributions</text>
<!-- TOP ROW: two bars same height -->
<text x="60" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="bold">What the bars show</text>
<rect x="80" y="64" width="540" height="130" fill="#F5F5F5"/>
