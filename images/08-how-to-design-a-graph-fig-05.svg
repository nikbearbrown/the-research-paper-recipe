<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-05 fig-desc-05"><title id="fig-title-05">Bars of means hide the distribution</title><desc id="fig-desc-05">Two conditions with the same mean look identical as bars. The raw points below reveal that the left condition is a tight unimodal cluster while the right is bimodal, split high and low, despite sharing a mean.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="08-how-to-design-a-graph" figure-number="05" date-generated="2026-05-29"/></metadata>
