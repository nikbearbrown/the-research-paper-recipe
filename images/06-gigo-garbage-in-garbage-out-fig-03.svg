<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03 fig-desc-03">
  <title id="fig-title-03">Missing post-tests pile up in the treatment group</title>
  <desc id="fig-desc-03">A two-bar chart with a count axis from zero. The treatment bar shows fifteen missing post-tests; the control bar shows three. The treatment bar is five times the height of the control bar, showing the lopsided dropout that signals biased loss rather than clerical noise.</desc>
