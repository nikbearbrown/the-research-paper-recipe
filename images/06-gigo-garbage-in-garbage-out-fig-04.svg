<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04">
  <title id="fig-title-04">One dataset fans out into many possible results</title>
  <desc id="fig-desc-04">A branching tree from a single dataset node on the left. Three successive decision levels — outlier rule, covariate set, outcome measure — each split the path, widening rightward into several terminal result nodes. Choosing among them after seeing the data multiplies possible findings and breaks p-value calibration.</desc>
