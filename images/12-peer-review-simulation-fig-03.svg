<!-- Comment Triage Routing | Book: The Research Paper Recipe | Chapter: 12-peer-review-simulation | Figure: 03 | Generated: 2026-05-29 | Source: pantry/12-peer-review-simulation-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Comment Triage Routing</title>
  <desc>A two-by-two grid sorting each simulated review comment by validity and seriousness into one of four actions: fix now, fix if time allows, improve the explanation, or discard with a stated reason. An incoming comment enters from the top and splits to the four cells.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="12-peer-review-simulation" figure-number="03" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Comment Triage Routing</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Sort each simulated comment on two axes &#8212; valid or not, serious or not &#8212; into one of four actions</text>

  <!-- incoming comment + entry arrow -->
  <rect x="290" y="78" width="120" height="34" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="350" y="100" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Each comment</text>
  <line x1="350" y1="112" x2="350" y2="138" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- axis labels -->
  <text x="270" y="158" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">VALID</text>
  <text x="490" y="158" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">INVALID</text>
  <text x="150" y="216" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">SERIOUS</text>
  <text x="150" y="316" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">MINOR</text>

  <!-- grid cells -->
  <!-- top-left: valid+serious -> fix now -->
  <rect x="170" y="170" width="200" height="90" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="270" y="208" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#C8102E" font-weight="600">Fix now</text>
  <text x="270" y="226" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">before submission</text>

  <!-- top-right: invalid+serious -> discard with reason -->
  <rect x="390" y="170" width="200" height="90" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="490" y="204" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">Discard</text>
  <text x="490" y="222" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">with a stated reason</text>
  <!-- reason-required marker: small loop to a dot -->
  <path d="M 470 236 a 8 8 0 1 1 8 6" fill="none" stroke="#545454" stroke-width="1" marker-end="url(#arrow)"/>
  <circle cx="490" cy="242" r="3" fill="#545454"/>

  <!-- bottom-left: valid+minor -> fix if time -->
  <rect x="170" y="270" width="200" height="90" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.5"/>
  <text x="270" y="308" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">Fix if time</text>
  <text x="270" y="326" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">allows</text>

  <!-- bottom-right: invalid+minor -> improve explanation -->
  <rect x="390" y="270" width="200" height="90" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="490" y="304" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">Improve the</text>
  <text x="490" y="322" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">explanation</text>
  <text x="490" y="340" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">a misread signals a gap</text>

  <!-- split arrows from entry -->
  <line x1="350" y1="138" x2="290" y2="168" stroke="#545454" stroke-width="1"/>
  <line x1="350" y1="138" x2="470" y2="168" stroke="#545454" stroke-width="1"/>

  <text x="32" y="398" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">An invalid comment still earns a written reason &#8212; the discard is a decision, not a shrug.</text>
</svg>
