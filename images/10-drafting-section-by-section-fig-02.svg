<!-- Each Section's Job and Boundary | Book: The Research Paper Recipe | Chapter: 10-drafting-section-by-section | Figure: 02 | Generated: 2026-05-29 | Source: pantry/10-drafting-section-by-section-cajal.md -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">Each Section's Job and Its Boundary</title>
  <desc>Six paper sections in drafting order, each split into the one job it must do and the one boundary it must not cross. An arrow shows that interpretation, forbidden in Results, belongs one section lower in the Discussion.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="10-drafting-section-by-section" figure-number="02" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Each Section's Job and Its Boundary</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">One job it must do, one line it must not cross &#8212; violations are where adjacent sections leak in</text>

  <!-- column headers -->
  <text x="60" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">SECTION</text>
  <text x="240" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">ITS JOB</text>
  <text x="500" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" font-weight="600">BOUNDARY: DO NOT</text>

  <!-- bands -->
  <!-- Methods -->
  <rect x="40" y="96" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="125" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Methods</text>
  <rect x="190" y="96" width="280" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="330" y="125" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Say what you did, reproducibly</text>
  <rect x="480" y="96" width="180" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="570" y="125" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Report results</text>

  <!-- Results -->
  <rect x="40" y="156" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="185" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Results</text>
  <rect x="190" y="156" width="280" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="330" y="185" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Report what you found</text>
  <rect x="480" y="156" width="180" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="570" y="180" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" font-weight="600">Interpret findings</text>
  <text x="570" y="196" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">(belongs below)</text>

  <!-- Discussion -->
  <rect x="40" y="216" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Discussion</text>
  <rect x="190" y="216" width="280" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="330" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Interpret what it means</text>
  <rect x="480" y="216" width="180" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="570" y="245" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Add new results</text>

  <!-- Introduction -->
  <rect x="40" y="276" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="305" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Introduction</text>
  <rect x="190" y="276" width="280" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="330" y="305" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Frame the question &amp; gap</text>
  <rect x="480" y="276" width="180" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="570" y="305" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Reveal conclusions</text>

  <!-- Abstract -->
  <rect x="40" y="336" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="365" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Abstract</text>
  <rect x="190" y="336" width="280" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="330" y="365" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Compress the whole paper</text>
  <rect x="480" y="336" width="180" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="570" y="365" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Introduce new claims</text>

  <!-- Title -->
  <rect x="40" y="396" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="425" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Title</text>
  <rect x="190" y="396" width="280" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="330" y="425" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Name the finding precisely</text>
  <rect x="480" y="396" width="180" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="570" y="425" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Overpromise scope</text>

  <!-- connector: Results boundary -> Discussion job -->
  <path d="M 660 181 H 678 V 241 H 662" fill="none" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="32" y="470" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The Results/Discussion leak is the classic one: interpretation forbidden in Results moves one section down.</text>
</svg>
