<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
  <title id="fig-title-04">Hypothesis-Driven Evidence Plan</title>
  <desc>The form of your hypothesis dictates the evidence plan. A causal claim demands a counterfactual design; a mechanistic claim demands measuring the mediator; a population claim demands a sample containing the target population.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="02-foundation" figure-number="04" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Hypothesis-Driven Evidence Plan</text>
  <text x="32" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The form of the claim dictates what design, measure, and sample you must contain</text>

  <!-- Root: hypothesis -->
  <rect x="24" y="180" width="120" height="70" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="84" y="210" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Your</text>
  <text x="84" y="226" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">hypothesis</text>

  <!-- Fan arrows to 3 condition nodes -->
  <line x1="144" y1="200" x2="266" y2="120" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="144" y1="215" x2="266" y2="215" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="144" y1="230" x2="266" y2="310" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Condition nodes -->
  <rect x="270" y="92" width="150" height="56" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="345" y="116" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">If causal...</text>
  <text x="345" y="134" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"X causes Y"</text>

  <rect x="270" y="187" width="150" height="56" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="345" y="211" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">If mechanistic...</text>
  <text x="345" y="229" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"X works via M"</text>

  <rect x="270" y="282" width="150" height="56" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="345" y="306" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">If population...</text>
  <text x="345" y="324" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"true for group G"</text>

  <!-- Arrows to requirement boxes -->
  <line x1="420" y1="120" x2="486" y2="120" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="215" x2="486" y2="215" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="310" x2="486" y2="310" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Requirement boxes -->
  <rect x="490" y="92" width="186" height="56" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.2"/>
  <text x="583" y="114" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Design that creates</text>
  <text x="583" y="130" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">a counterfactual</text>

  <rect x="490" y="187" width="186" height="56" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.2"/>
  <text x="583" y="209" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Measure the</text>
  <text x="583" y="225" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">mediator M</text>

  <rect x="490" y="282" width="186" height="56" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.2"/>
  <text x="583" y="304" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Sample containing</text>
  <text x="583" y="320" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">group G</text>

  <text x="345" y="74" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">claim form</text>
  <text x="583" y="74" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">required evidence</text>

  <text x="32" y="376" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Choose the design your claim demands, not the one convenience offers — the verb writes the method.</text>
</svg>
