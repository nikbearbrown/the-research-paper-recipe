<text x="350" y="32" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The CARS introduction funnel</text>
<!-- Move 1: widest band -->
<path d="M160 60 L540 60 L500 120 L200 120 Z" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.4"/>
<text x="350" y="86" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Move 1 — Establish the territory</text>
<text x="350" y="104" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(broad: why the field matters)</text>
<line x1="350" y1="120" x2="350" y2="150" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arr03b)"/>
<!-- Move 2: narrower, red emphasis (the pivot) -->
