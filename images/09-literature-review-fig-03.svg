<text x="600" y="194" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">intro is a parade</text>
<line x1="490" y1="182" x2="540" y2="183" stroke="#545454" stroke-width="1" stroke-dasharray="3 3"/>
