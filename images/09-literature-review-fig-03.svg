<text x="350" y="178" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">Move 2 — Establish the niche</text>
<text x="350" y="196" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(the pivot: name the gap)</text>
<line x1="350" y1="212" x2="350" y2="242" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arr03b)"/>
<!-- missing-niche reserved slot beside move 2 -->
<rect x="540" y="160" width="120" height="46" fill="#FFFFFF" stroke="#545454" stroke-width="1" stroke-dasharray="4 3"/>
