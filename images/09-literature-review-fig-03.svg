<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03 fig-desc-03"><title id="fig-title-03">CARS three-move funnel</title><desc id="fig-desc-03">A research introduction narrows like a funnel through three dependent moves: establish the territory (broad), establish the niche (the gap pivot), occupy the niche (the study), arriving at the hypothesis. A dashed slot beside the niche marks the move writers most often skip.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="09-literature-review" figure-number="03" date-generated="2026-05-29"/></metadata>
