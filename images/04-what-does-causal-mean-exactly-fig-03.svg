<!-- Confounder DAG | Book: The Research Paper Recipe | Chapter: 04-what-does-causal-mean-exactly | Figure: 03 | Generated: 2026-05-29 | Source: pantry/04-what-does-causal-mean-exactly-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03 fig-desc-03">
  <title id="fig-title-03">A confounder points into both cause and outcome</title>
  <desc id="fig-desc-03">A directed graph: cause X at lower left, outcome Y at lower right, confounder Z at top centre. Z sends arrows into both X and Y, while X also points to Y. The two arrows out of Z are the confounding paths that distort the raw association.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="04-what-does-causal-mean-exactly" figure-number="03" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker>
    <marker id="arrowR" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#C8102E"/></marker>
  </defs>

  <text x="40" y="44" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Confounder: a common cause of X and Y</text>

  <!-- confounder Z top center -->
  <circle cx="350" cy="130" r="42" fill="#F5F5F5" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="128" font-family="'JetBrains Mono','Fira Code',monospace" font-size="16" fill="#2a1a0e" text-anchor="middle">Z</text>
  <text x="350" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">confounder</text>

  <!-- cause X lower left -->
  <circle cx="180" cy="310" r="42" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="180" y="308" font-family="'JetBrains Mono','Fira Code',monospace" font-size="16" fill="#2a1a0e" text-anchor="middle">X</text>
  <text x="180" y="328" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">cause</text>

  <!-- outcome Y lower right -->
  <circle cx="520" cy="310" r="42" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="520" y="308" font-family="'JetBrains Mono','Fira Code',monospace" font-size="16" fill="#2a1a0e" text-anchor="middle">Y</text>
  <text x="520" y="328" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">outcome</text>

  <!-- Z -> X (red confounding) -->
  <line x1="318" y1="158" x2="208" y2="282" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Z -> Y (red confounding) -->
  <line x1="382" y1="158" x2="492" y2="282" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- X -> Y (hypothesis path) -->
  <line x1="222" y1="310" x2="476" y2="310" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="270" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">confounding</text>
  <text x="270" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">paths</text>
  <text x="350" y="298" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">hypothesised effect</text>

  <text x="40" y="396" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Because Z drives both X and Y, the raw X–Y association mixes the real effect with Z's influence.</text>
</svg>
