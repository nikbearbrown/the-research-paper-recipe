  <text x="32" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The red flag marks the one target generic review never reaches &#8212; the alignment that decides whether the paper holds.</text>
  <text x="32" y="400" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">An adversarial prompt spends its attention where the fatal failures actually live.</text>
