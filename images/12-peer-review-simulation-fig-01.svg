  <title id="fig-title-01">Generic Review vs. Adversarial Simulation</title>
  <desc>The same four review targets, scanned two ways. Generic review reaches fluency, organization, and completeness but misses claim-evidence-frame alignment, the one fatal target, marked with a red flag. Adversarial simulation drives straight at alignment and de-prioritizes the surface targets.</desc>
