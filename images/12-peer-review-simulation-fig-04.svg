<!-- The Four Targeted Simulation Questions | Book: The Research Paper Recipe | Chapter: 12-peer-review-simulation | Figure: 04 | Generated: 2026-05-29 | Source: pantry/12-peer-review-simulation-cajal.md -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
  <title id="fig-title-04">The Four Targeted Simulation Questions</title>
  <desc>A useful peer-review simulation asks four ordered questions, each reaching a different layer of the paper: tiered Critical-Major-Minor issues, the single strongest reason to reject, the Introduction-to-Results alignment, and the causation or generalization overclaim audit.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="12-peer-review-simulation" figure-number="04" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Four Targeted Simulation Questions</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Four questions in order &#8212; each reaches a different layer that "please review this" never touches</text>

  <!-- column headers -->
  <text x="200" y="92" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">QUESTION</text>
  <text x="540" y="92" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="600">WHAT IT REACHES</text>

  <!-- Q1 -->
  <rect x="50" y="104" width="300" height="56" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="64" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">1. List issues, tiered as</text>
  <text x="64" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Critical / Major / Minor</text>
  <!-- target: three-segment stack -->
  <rect x="470" y="106" width="140" height="16" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.2"/>
  <rect x="470" y="124" width="140" height="16" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.2"/>
  <rect x="470" y="142" width="140" height="16" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.2"/>
  <text x="540" y="174" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">the three tiers</text>
  <line x1="350" y1="132" x2="468" y2="132" stroke="#545454" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q2 -->
  <rect x="50" y="196" width="300" height="56" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="64" y="220" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">2. What is the single</text>
  <text x="64" y="238" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">strongest reason to reject?</text>
  <!-- target: one emphasized node -->
  <rect x="500" y="206" width="80" height="36" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="540" y="266" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">the one fatal reason</text>
  <line x1="350" y1="224" x2="498" y2="224" stroke="#545454" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q3 -->
  <rect x="50" y="288" width="300" height="56" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="64" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">3. Do the Results answer the</text>
  <text x="64" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Introduction's question?</text>
  <!-- target: paired node -->
  <rect x="478" y="298" width="58" height="36" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="544" y="298" width="58" height="36" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="540" y="358" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">the two sections compared</text>
  <line x1="350" y1="316" x2="476" y2="316" stroke="#545454" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q4 -->
  <rect x="50" y="380" width="300" height="56" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="64" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">4. Any causation or</text>
  <text x="64" y="422" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">generalization overclaim?</text>
  <!-- target: overclaim flag -->
  <polygon points="510,390 570,390 570,430 540,420 510,430" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="540" y="450" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">the overclaim flag</text>
  <line x1="350" y1="408" x2="508" y2="408" stroke="#545454" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- vertical flow arrows between questions -->
  <line x1="200" y1="160" x2="200" y2="194" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="252" x2="200" y2="286" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="344" x2="200" y2="378" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="32" y="472" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Asked in order, the four questions force specific answers at four depths instead of one vague "looks good."</text>
</svg>
