<!-- GIGO pipeline: garbage propagates | Book: The Research Paper Recipe | Chapter: 06-gigo-garbage-in-garbage-out | Figure: 01 | Generated: 2026-05-29 | Source: pantry/06-gigo-garbage-in-garbage-out-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01">
  <title id="fig-title-01">Corruption in the raw data survives the whole pipeline</title>
  <desc id="fig-desc-01">A left-to-right pipeline of four stages — raw data, cleaning, model, output — joined by arrows. The raw-data stage is marked as corrupted, and a small defect marker is carried through every later stage, so a clean-looking output still hides the original corruption.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="06-gigo-garbage-in-garbage-out" figure-number="01" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker>
  </defs>

  <text x="40" y="44" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Garbage in, garbage out — the defect rides through</text>

  <!-- stage boxes -->
  <!-- raw data (corrupted source, red) -->
  <rect x="40" y="170" width="130" height="80" fill="#F5F5F5" stroke="#C8102E" stroke-width="2"/>
  <text x="105" y="206" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">Raw data</text>
  <text x="105" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#C8102E" text-anchor="middle">corrupted source</text>
  <circle cx="156" cy="184" r="6" fill="#C8102E"/>

  <!-- cleaning -->
  <rect x="230" y="170" width="130" height="80" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="295" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">Cleaning</text>
  <circle cx="346" cy="184" r="6" fill="#C8102E"/>

  <!-- model -->
  <rect x="420" y="170" width="130" height="80" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="485" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">Model</text>
  <circle cx="536" cy="184" r="6" fill="#C8102E"/>

  <!-- output -->
  <rect x="560" y="170" width="120" height="80" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="620" y="206" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">Output</text>
  <text x="620" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">looks clean</text>
  <circle cx="666" cy="184" r="6" fill="#C8102E"/>

  <!-- arrows -->
  <line x1="170" y1="210" x2="226" y2="210" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="210" x2="416" y2="210" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="210" x2="556" y2="210" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="360" y="300" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">The red marker is the same defect — cleaning and modelling never removed it.</text>
  <text x="40" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A polished output does not certify the data underneath it.</text>
</svg>
