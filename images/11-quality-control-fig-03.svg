<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Sequence the Audit Before the Polish</title>
  <desc>Two orderings from the same rough draft. Correct order audits and fixes while errors are still visible, then polishes. Inverted order polishes first, so an unsupported claim becomes a hidden defect carried under fluent prose into an audit that can no longer see it.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="11-quality-control" figure-number="03" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Sequence the Audit Before the Polish</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Audit while errors are still visible in rough prose; polishing first hides defects under fluency</text>

  <!-- correct order -->
  <text x="32" y="100" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">CORRECT: audit, then polish</text>
  <rect x="40" y="112" width="150" height="56" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="115" y="145" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Rough draft</text>

  <rect x="270" y="112" width="150" height="56" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="345" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Audit &amp; fix</text>
  <text x="345" y="155" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">errors still visible</text>

  <rect x="500" y="112" width="150" height="56" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="575" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Polish</text>
  <text x="575" y="155" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">on a clean claim</text>

  <line x1="190" y1="140" x2="268" y2="140" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="140" x2="498" y2="140" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- inverted order -->
  <text x="32" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" font-weight="600">INVERTED: polish, then audit</text>
  <rect x="40" y="252" width="150" height="56" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="115" y="285" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Rough draft</text>

  <rect x="270" y="252" width="150" height="56" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="345" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Polish</text>
  <text x="345" y="295" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">fluency added first</text>
  <circle cx="405" cy="266" r="5" fill="#C8102E"/>

  <rect x="500" y="252" width="150" height="56" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="575" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" font-weight="600">Audit (too late)</text>
  <text x="575" y="295" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">defect now hidden</text>
  <circle cx="635" cy="266" r="5" fill="#C8102E" fill-opacity="0.45"/>

  <line x1="190" y1="280" x2="268" y2="280" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="280" x2="498" y2="280" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- align starts -->
  <line x1="115" y1="168" x2="115" y2="252" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="32" y="356" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The red dot is an unsupported claim. Polished first, it rides smooth prose past the audit and survives unfixed.</text>
  <text x="32" y="376" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Run logic and statistics checks on rough text first; reach for AI polish only once the claims are sound.</text>
</svg>
