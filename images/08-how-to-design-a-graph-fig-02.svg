<text x="350" y="32" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">How accurately we read each encoding</text>
<text x="350" y="52" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">shorter bar = judged more accurately</text>
<rect x="240" y="72" width="400" height="288" fill="#F5F5F5"/>
<!-- value axis bottom, category axis left -->
<line x1="240" y1="360" x2="640" y2="360" stroke="#2a1a0e" stroke-width="1.2"/>
<line x1="240" y1="72" x2="240" y2="360" stroke="#2a1a0e" stroke-width="1.2"/>
<text x="440" y="392" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Relative judgment error →</text>
