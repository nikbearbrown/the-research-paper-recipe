<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">Cleveland-McGill encoding-channel accuracy ranking</title><desc id="fig-desc-02">A horizontal bar chart of six perceptual encoding channels ranked by judgment error. Position on a common scale is read most accurately with the shortest error bar; length, position on non-aligned scales, angle, and area follow; color and saturation are least accurate.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="08-how-to-design-a-graph" figure-number="02" date-generated="2026-05-29"/></metadata>
