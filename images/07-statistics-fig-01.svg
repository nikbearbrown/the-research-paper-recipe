<!-- What a p-value actually says | Book: The Research Paper Recipe | Chapter: 07-statistics | Figure: 01 | Generated: 2026-05-29 | Source: pantry/07-statistics-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01"><title id="fig-title-01">What a p-value actually says</title><desc id="fig-desc-01">A null sampling distribution bell curve with a vertical line at the observed test statistic; the shaded upper tail beyond that line is the p-value, the probability of data this extreme if the null is true.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="07-statistics" figure-number="01" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<defs><marker id="arr01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2a1a0e"/></marker></defs>
<text x="350" y="36" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">What a p-value actually says</text>
<!-- axis -->
<line x1="90" y1="320" x2="640" y2="320" stroke="#2a1a0e" stroke-width="1.2"/>
<!-- null curve: gaussian centered x=320 -->
<path d="M110 320 C 200 320 230 110 320 110 C 410 110 440 320 530 320" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.4"/>
<!-- shaded upper tail right of observed line x=455 -->
<path d="M455 320 C 472 240 496 168 530 320 Z" fill="#C8102E" fill-opacity="0.85" stroke="none"/>
<path d="M455 320 C 472 240 496 168 530 320" fill="none" stroke="#2a1a0e" stroke-width="0.8"/>
<!-- null tick at center -->
<line x1="320" y1="320" x2="320" y2="332" stroke="#2a1a0e" stroke-width="1.2"/>
<text x="320" y="350" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Null value</text>
<!-- observed statistic line -->
<line x1="455" y1="320" x2="455" y2="96" stroke="#C8102E" stroke-width="1.6"/>
<text x="455" y="88" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">Observed statistic</text>
<!-- bracket beneath tail -->
<path d="M455 360 L455 368 L530 368 L530 360" fill="none" stroke="#545454" stroke-width="1"/>
<line x1="492" y1="368" x2="492" y2="388" stroke="#545454" stroke-width="1" marker-end="url(#arr01)"/>
<text x="540" y="392" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">shaded tail = p-value</text>
<!-- misconception callout -->
<rect x="118" y="150" width="190" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="128" y="172" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">NOT the probability that</text>
<text x="128" y="188" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the null hypothesis is true.</text>
<text x="128" y="206" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">It is a tail area, not a verdict.</text>
<line x1="308" y1="200" x2="430" y2="240" stroke="#D4D4D4" stroke-width="1"/>
<text x="113" y="318" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">density</text>
<text x="640" y="338" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">test statistic →</text>
</svg>
