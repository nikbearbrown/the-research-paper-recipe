<!-- Cross-Section Consistency Check | Book: The Research Paper Recipe | Chapter: 12-peer-review-simulation | Figure: 02 | Generated: 2026-05-29 | Source: pantry/12-peer-review-simulation-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">Cross-Section Consistency Check</title>
  <desc>Introduction, Results, and Discussion shown twice. In a sound paper all three sit on one shared question axis. In a drifting paper the Discussion leaves the axis, answering a question the Introduction never asked, a Critical issue marked by a divergence arrow.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="12-peer-review-simulation" figure-number="02" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Cross-Section Consistency Check</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">One question asked, tested, and answered &#8212; drift means the paper answers a question it never asked</text>

  <!-- ALIGNED row -->
  <text x="32" y="100" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">ALIGNED</text>
  <line x1="130" y1="135" x2="660" y2="135" stroke="#545454" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="540" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">shared question axis</text>

  <rect x="130" y="110" width="140" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="200" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Introduction</text>
  <rect x="320" y="110" width="140" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="390" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Results</text>
  <rect x="510" y="110" width="140" height="50" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="580" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Discussion</text>

  <line x1="270" y1="135" x2="318" y2="135" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="135" x2="508" y2="135" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DRIFT row -->
  <text x="32" y="250" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" font-weight="600">DRIFT</text>
  <line x1="130" y1="285" x2="660" y2="285" stroke="#545454" stroke-width="1" stroke-dasharray="5 4"/>

  <rect x="130" y="260" width="140" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="200" y="290" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Introduction</text>
  <rect x="320" y="260" width="140" height="50" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="390" y="290" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Results</text>
  <!-- Discussion off the axis -->
  <rect x="510" y="320" width="140" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="580" y="350" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">Discussion</text>

  <line x1="270" y1="285" x2="318" y2="285" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="285" x2="508" y2="300" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- divergence arrow marking the gap -->
  <line x1="580" y1="285" x2="580" y2="318" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="592" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">left the axis</text>

  <text x="32" y="400" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">When the Discussion drops off the shared axis, the paper answers a different question than the one it set out to ask.</text>
</svg>
