<!-- Pearl's causal hierarchy | Book: The Research Paper Recipe | Chapter: 04-what-does-causal-mean-exactly | Figure: 02 | Generated: 2026-05-29 | Source: pantry/04-what-does-causal-mean-exactly-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02">
  <title id="fig-title-02">Pearl's causal hierarchy: three rungs of questions</title>
  <desc id="fig-desc-02">Three ascending rungs — association, intervention, counterfactual. Each higher rung answers a deeper question and demands a stronger study design. An upward arrow marks increasing depth; each rung carries a design slot.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="04-what-does-causal-mean-exactly" figure-number="02" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker>
  </defs>

  <text x="40" y="44" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">The ladder of causation — each rung demands more</text>

  <!-- ascent arrow -->
  <line x1="70" y1="350" x2="70" y2="95" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="56" y="230" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 56 230)" text-anchor="middle">increasing depth &amp; required design</text>

  <!-- bottom rung: association -->
  <rect x="110" y="300" width="380" height="56" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
  <text x="124" y="324" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">1. Association</text>
  <text x="124" y="344" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"What is X associated with?" — seeing</text>
  <rect x="500" y="300" width="160" height="56" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="580" y="333" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">observational study</text>

  <!-- middle rung: intervention -->
  <rect x="110" y="218" width="380" height="56" fill="#F5F5F5" stroke="#C8860E" stroke-width="1.5"/>
  <text x="124" y="242" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">2. Intervention</text>
  <text x="124" y="262" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"What if I do X?" — doing</text>
  <rect x="500" y="218" width="160" height="56" fill="#FFFFFF" stroke="#C8860E" stroke-width="1"/>
  <text x="580" y="251" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">randomized experiment</text>

  <!-- top rung: counterfactual -->
  <rect x="110" y="136" width="380" height="56" fill="#F5F5F5" stroke="#C8102E" stroke-width="2"/>
  <text x="124" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e">3. Counterfactual</text>
  <text x="124" y="180" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"What would have happened?" — imagining</text>
  <rect x="500" y="136" width="160" height="56" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="580" y="169" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">structural model</text>

  <text x="110" y="396" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A study can only answer questions at or below the rung its design reaches.</text>
</svg>
