<!-- Summary Table vs. Source Matrix | Book: The Research Paper Recipe | Chapter: 02-foundation | Figure: 03 | Generated: 2026-05-29 | Source: pantry/02-foundation-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Summary Table vs. Source Matrix</title>
  <desc>A summary table records what each source found. A source matrix is the same table plus one load-bearing column — what each finding licenses you to borrow — highlighted on the right.</desc>
