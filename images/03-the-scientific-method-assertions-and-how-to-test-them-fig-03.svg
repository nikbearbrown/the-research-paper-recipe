<!-- The Null Test as a Decision Procedure | Book: The Research Paper Recipe | Chapter: 03-the-scientific-method-assertions-and-how-to-test-them | Figure: 03 | Generated: 2026-05-29 | Source: pantry/03-the-scientific-method-assertions-and-how-to-test-them-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">The Null Test as a Decision Procedure</title>
  <desc>Hypothesis testing is a decision rule: assume the null is true, compute how surprising the data are under it, and at a pre-set threshold decide whether to act as if the null is false. It is not a search for the null's truth.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="03-the-scientific-method-assertions-and-how-to-test-them" figure-number="03" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Null Test as a Decision Procedure</text>
  <text x="32" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A conditional rule for action — not a search for whether the null is true</text>

  <!-- Box 1: assume null -->
  <rect x="250" y="78" width="200" height="48" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="350" y="100" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Assume the null is true</text>
  <text x="350" y="116" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"no effect"</text>

  <line x1="350" y1="126" x2="350" y2="146" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Box 2: compute surprise -->
  <rect x="250" y="150" width="200" height="48" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="350" y="172" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Compute how surprising</text>
  <text x="350" y="188" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the data are under it</text>

  <line x1="350" y1="198" x2="350" y2="218" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="350,222 446,272 350,322 254,272" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="350" y="268" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Past the</text>
  <text x="350" y="284" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">threshold?</text>

  <!-- Branch arrows -->
  <line x1="290" y1="300" x2="180" y2="340" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="218" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">yes</text>
  <line x1="410" y1="300" x2="520" y2="340" stroke="#2a1a0e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="466" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">no</text>

  <!-- Outcome boxes -->
  <rect x="60" y="344" width="190" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.2"/>
  <text x="155" y="366" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Act as if the null is false</text>
  <text x="155" y="382" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(reject)</text>

  <rect x="450" y="344" width="190" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="545" y="366" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Do not reject</text>
  <text x="545" y="382" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(not "the null is true")</text>

  <text x="475" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The threshold is set</text>
  <text x="475" y="136" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">before you see the data.</text>
</svg>
