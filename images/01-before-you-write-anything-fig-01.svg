<!-- The Falsifiability Ladder | Book: The Research Paper Recipe | Chapter: 01-before-you-write-anything | Figure: 01 | Generated: 2026-05-29 | Source: pantry/01-before-you-write-anything-cajal.md -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The Falsifiability Ladder</title>
  <desc>Four ascending rungs show a claim gaining content as it is compressed from a vague topic to a falsifiable hypothesis. Each rung up is narrower and rules out more, marked by a growing bracket on the right.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="the-research-paper-recipe" chapter="01-before-you-write-anything" figure-number="01" date-generated="2026-05-29"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Falsifiability Ladder</text>
  <text x="32" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A claim gains content as it is compressed — each rung up rules out more</text>

  <!-- Rung 1: vague topic (widest, lightest) -->
  <rect x="120" y="330" width="380" height="46" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="132" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Vague topic — "AI and education"</text>
  <text x="510" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">rules out nothing</text>

  <!-- Rung 2: narrowed claim -->
  <rect x="150" y="262" width="320" height="46" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="162" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Narrowed claim — "AI tutoring helps learning"</text>
  <text x="510" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">rules out a little</text>

  <!-- Rung 3: specified comparison -->
  <rect x="180" y="194" width="260" height="46" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="192" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Specified comparison — vs. human tutoring</text>
  <text x="510" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">rules out more</text>

  <!-- Rung 4: falsifiable hypothesis (top, narrowest, emphasis) -->
  <rect x="210" y="126" width="200" height="46" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="222" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Falsifiable hypothesis</text>
  <text x="510" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">names what would defeat it</text>

  <!-- Growing rule-out brackets on the right -->
  <path d="M 642 352 l -6 0 l 0 -6 M 642 354 l -6 0 l 0 6" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <path d="M 644 282 l -10 0 l 0 -9 M 644 286 l -10 0 l 0 9" fill="none" stroke="#545454" stroke-width="1"/>
  <path d="M 646 213 l -14 0 l 0 -12 M 646 219 l -14 0 l 0 12" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <path d="M 648 144 l -18 0 l 0 -16 M 648 150 l -18 0 l 0 16" fill="none" stroke="#C8102E" stroke-width="1.2"/>

  <!-- Left-spine ascending arrow -->
  <line x1="86" y1="372" x2="86" y2="124" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="60" y="250" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 60 250)">increasing specificity</text>

  <text x="32" y="408" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The test of a claim is what it forbids: a hypothesis you cannot lose is not worth winning.</text>
</svg>
