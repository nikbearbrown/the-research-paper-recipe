<title id="fig-title-04">Citation Bias: One-Sided Review vs. Representative Field</title>
<desc id="fig-desc-04">Two equal-height stacked bars on a common zero baseline. The curated one-sided review is dominated by positive findings; the representative field sample splits more evenly across positive, mixed, and null results. The gap measures citation distortion.</desc>
