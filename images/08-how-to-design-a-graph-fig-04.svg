<text x="590" y="368" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Raw points + mean</text>
<text x="350" y="402" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Unlabeled error bars are uninterpretable; showing the points removes the doubt.</text>
